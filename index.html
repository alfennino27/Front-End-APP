<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/src/assets/images/klflogo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>KLF Project Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <style>
      body {
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        margin: 0;
        padding: 0;
        height: 100vh;
      }
    </style>

    <script type="text/javascript">
      // Fungsi untuk mengubah background berdasarkan tema
      function updateBackground(theme) {
        if (theme === 'light') {
          document.body.style.backgroundImage = "url('/assets/background/Abstract-Plain-White-Wallpaper-.jpg')";
        } else {
          document.body.style.backgroundImage = "url('/assets/background/WhatsApp Image 2024-09-30 at 10.09.38 1.png')";
        }
      }

      // Pada awal load, atur background sesuai dengan localStorage
      document.addEventListener('DOMContentLoaded', function () {
        const savedTheme = localStorage.getItem('theme') || 'light';
        updateBackground(savedTheme);
      });

      // Event listener untuk perubahan tema dari React
      window.addEventListener('themeChange', function (e) {
        const newTheme = e.detail;
        updateBackground(newTheme);
        localStorage.setItem('theme', newTheme); // Simpan tema ke localStorage
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-bootstrap@next/dist/react-bootstrap.min.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
